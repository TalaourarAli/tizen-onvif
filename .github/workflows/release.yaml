name: Build and Release Module

on:
  push:
    tags:
      - 'v*'

# 🔴 AJOUTE CE BLOC ICI
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Zip Archive
        run: zip -r module.zip . -x "*.git*" ".github/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2 # 🔄 Mis à jour en v2
        with:
          files: module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}